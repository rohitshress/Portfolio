    <link rel="stylesheet" href="style.css">
    <style>
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>

    <div class="container">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1>Get In Touch</h1>
        <p>Have a question about Science or Web Dev? Send me a message!</p>
    </div>

    <form class="contact-form" action="#">
        <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>

        <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>

<div style="text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
    <p style="color: #777; margin-bottom: 20px; font-style: italic;">Connect with me professionally or personally:</p>

            LinkedIn
        </a>

        <a href="https://facebook.com/rohitshress" class="social-item facebook" target="_blank">
            Facebook
        </a>
        
        <a href="https://instagram.com/rohitshress" class="social-item instagram" target="_blank">
